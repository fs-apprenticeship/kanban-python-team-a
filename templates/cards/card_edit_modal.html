<div class="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-header-bar"></div>
      <div class="modal-header-actions">
        <button onclick="closeModal()" class="btn-close">✕</button>
      </div>
    </div>

    <div class="modal-body">
      <h2 class="modal-title">Edit task</h2>

      <form
        hx-post="/cards/{{ card.id }}/edit/"
        hx-target="#modal-container"
        hx-swap="innerHTML"
      >
        {% csrf_token %}

        <div class="field-group">
          <label>Title</label>
          <input
            type="text"
            name="title"
            value="{{ card.title }}"
            class="input"
            required
          />
        </div>

        <div class="field-group">
          <label>Description</label>
          <textarea name="description" class="input" rows="4">
{{ card.description }}</textarea
          >
        </div>

        <div class="field-group">
          <label>Status</label>
          <select name="status" class="input">
            {% for val,label in card.Status.choices %}
            <option
              value="{{ val }}"
              {%
              if
              card.status=""
              ="val"
              %}selected{%
              endif
              %}
            >
              {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem">
          <button type="submit" class="btn-primary">Save</button>
          <button
            type="button"
            onclick="closeModal()"
            class="btn-close"
            style="
              background: none;
              border: 1px solid #ddd;
              padding: 0.45rem 0.75rem;
              border-radius: 6px;
            "
          >
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  /* reuse same styles as detail/delete modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal {
    background: white;
    border-radius: 10px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
  }

  .modal-header {
    background: #80cbc4;
    padding: 0.75rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header-bar {
    width: 60px;
    height: 4px;
    background: rgba(0, 0, 0, 0.15);
    border-radius: 2px;
  }

  .modal-header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    color: #333;
  }

  .modal-body {
    padding: 1.75rem;
  }

  .modal-title {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 1rem;
  }

  .field-group {
    margin-bottom: 1.25rem;
  }

  .field-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.5rem;
  }

  .input {
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
  }

  .btn-primary {
    background: #2196f3;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .btn-primary:hover {
    background: #1565c0;
  }
</style>

<script>
  function closeModal() {
    document.getElementById("modal-container").innerHTML = "";
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeModal();
  });
</script>
